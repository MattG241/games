name: Deploy RetroPlay to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages (auto-enable)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      # Publish the retroplay/ folder as the site root, so the app is served at
      # https://<user>.github.io/<repo>/  (index.html at the root).
      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: retroplay

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
