<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#ff2d95" />
<title>NEON DRIVE — Leonida</title>
<style>
  :root { --pink:#ff2d95; --cyan:#00e5ff; --yellow:#ffd23f; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:100%; height:100%; overflow:hidden; background:#05010f; color:#fff;
    font-family:'Segoe UI', system-ui, -apple-system, Roboto, Helvetica, Arial, sans-serif;
    -webkit-user-select:none; user-select:none; touch-action:none; cursor:default; }
  #game { position:fixed; inset:0; }
  canvas { display:block; }
  #grade { position:fixed; inset:0; z-index:8; pointer-events:none; mix-blend-mode:soft-light; opacity:.3; background:#fff; transition:background .8s; }

  #hud { position:fixed; inset:0; pointer-events:none; z-index:10; }
  .panel { position:absolute; }
  #speedo { right:2.5vw; bottom:2.4vh; text-align:right; text-shadow:0 0 18px rgba(0,229,255,.5); }
  #speedNum { font-size:min(9vw,86px); font-weight:800; line-height:.9; font-variant-numeric:tabular-nums;
    background:linear-gradient(180deg,#fff,var(--cyan)); -webkit-background-clip:text; background-clip:text; color:transparent; }
  #speedUnit { font-size:min(2.2vw,20px); letter-spacing:.35em; color:var(--cyan); opacity:.85; }
  #gearBox { font-size:min(2.6vw,22px); letter-spacing:.2em; color:var(--yellow); margin-top:.15em; }
  #topright { right:2.5vw; top:2.4vh; text-align:right; }
  #cash { font-size:min(5vw,42px); font-weight:800; color:var(--yellow); text-shadow:0 0 16px rgba(255,210,63,.55); font-variant-numeric:tabular-nums; }
  #stars { margin-top:.3em; font-size:min(4vw,30px); letter-spacing:.12em; filter:drop-shadow(0 0 6px rgba(255,45,149,.7)); }
  #stars .off { opacity:.16; }
  #objective { left:2.5vw; top:2.4vh; max-width:44vw; }
  #objLabel { font-size:min(2vw,15px); letter-spacing:.3em; color:var(--pink); text-transform:uppercase; }
  #objText { font-size:min(3.1vw,25px); font-weight:700; margin-top:.12em; line-height:1.15; text-shadow:0 2px 12px rgba(0,0,0,.6); }
  #dist { font-size:min(2.4vw,18px); color:var(--cyan); margin-top:.15em; }
  #minimapWrap { left:2.2vw; bottom:2.4vh; width:min(25vw,200px); height:min(25vw,200px);
    border-radius:50%; overflow:hidden; border:3px solid rgba(255,45,149,.55);
    box-shadow:0 0 26px rgba(255,45,149,.35), inset 0 0 30px rgba(0,0,0,.6); }
  #minimap { width:100%; height:100%; display:block; background:#0a0620; }
  #prompt { left:50%; bottom:17vh; transform:translateX(-50%); text-align:center; opacity:0; transition:opacity .18s; }
  #prompt.show { opacity:1; }
  .btnGlyph { display:inline-flex; align-items:center; justify-content:center; min-width:2em; height:2em; padding:0 .5em;
    border-radius:.55em; font-weight:800; margin-right:.5em; box-shadow:0 3px 0 rgba(0,0,0,.4); }
  .glyphY { background:#ffd23f; color:#111; }
  #promptText { font-size:min(3vw,22px); font-weight:600; text-shadow:0 2px 10px rgba(0,0,0,.7); }
  #toast { position:fixed; left:50%; top:13vh; transform:translateX(-50%) translateY(-20px);
    background:rgba(10,4,26,.82); border:1px solid rgba(0,229,255,.4); padding:.65em 1.3em; border-radius:.7em;
    font-size:min(3vw,22px); font-weight:600; opacity:0; transition:opacity .3s, transform .3s; z-index:20;
    box-shadow:0 8px 30px rgba(0,0,0,.5); text-align:center; pointer-events:none; }
  #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  #toast b { color:var(--yellow); }
  .screen { position:fixed; inset:0; z-index:40; }
  .hidden { display:none !important; }
  .key { display:inline-block; min-width:1.7em; padding:.1em .5em; margin:0 .1em; border-radius:.4em;
    background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.18); font-weight:700; font-size:.9em; }
  .logoImg { font-weight:900; line-height:.82; filter:drop-shadow(0 4px 30px rgba(255,45,149,.55)); }
  .logoImg .l1 { display:block; font-size:min(9vw,92px); letter-spacing:-.01em;
    background:linear-gradient(180deg,#8ff0ff,#00cfe6); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .logoImg .l2 { display:block; font-size:min(9vw,92px); font-style:italic; margin-top:-.08em;
    background:linear-gradient(180deg,#ff8fd0,#ff1f8f); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .logoImg .l2::after { content:" 🌴"; -webkit-text-fill-color:initial; font-size:.7em; }

  /* ---------------- LOADING ---------------- */
  #loading { position:fixed; inset:0; z-index:70; background:#05010f center/cover no-repeat; display:flex; flex-direction:column; justify-content:flex-end; }
  #loading::after { content:""; position:absolute; inset:0; background:linear-gradient(to top, rgba(3,1,10,.96) 4%, rgba(3,1,10,.55) 16%, rgba(0,0,0,0) 34%); pointer-events:none; }
  #loadingInner { position:relative; z-index:2; padding:0 4vw 4.2vh; }
  #loadtext { letter-spacing:.22em; font-size:min(3vw,22px); font-weight:700; color:#fff; text-shadow:0 2px 10px #000; margin-bottom:.7em; }
  #loadtext b { color:var(--pink); }
  #loadRow { display:flex; align-items:center; gap:1.2vw; }
  #loadbarWrap { flex:1; height:min(1.6vh,11px); border-radius:99px; background:rgba(255,255,255,.14); overflow:hidden; box-shadow:inset 0 0 8px rgba(0,0,0,.6); }
  #loadbar { height:100%; width:0; border-radius:99px; background:linear-gradient(90deg,#ff8a3d,var(--pink)); transition:width .2s ease; box-shadow:0 0 14px rgba(255,45,149,.7); }
  #loadpct { font-size:min(3.4vw,30px); font-weight:800; color:#fff; font-variant-numeric:tabular-nums; min-width:2.6em; text-align:right; text-shadow:0 2px 8px #000; }
  #loadtip { position:absolute; top:4vh; left:4vw; z-index:2; max-width:52vw; font-size:min(2.4vw,18px); color:#e7dcf7; text-shadow:0 2px 8px #000; opacity:.9; }
  #loadtip b { color:var(--yellow); }

  /* ---------------- shared menu chrome ---------------- */
  .menuScreen { position:fixed; inset:0; z-index:50; background:#05010f center/cover no-repeat; overflow:hidden; }
  /* home: light touch so the baked title shows; darken only bottom-left for button legibility */
  .menuScreen::before { content:""; position:absolute; inset:0; pointer-events:none;
    background:linear-gradient(to top, rgba(3,1,10,.9) 0%, rgba(3,1,10,.3) 22%, rgba(3,1,10,0) 46%),
               radial-gradient(90% 80% at 18% 88%, rgba(3,1,10,.75), rgba(3,1,10,0) 60%); }
  #pause::before { background:linear-gradient(105deg, rgba(3,1,10,.9) 42%, rgba(3,1,10,.55) 100%); }
  .footIc { height:1.4em; width:1.4em; object-fit:contain; vertical-align:middle; opacity:.85; }
  /* icon slots — vanish (this.remove()) if the PNG is absent, leaving clean text */
  .mIcon { display:inline-block; width:1.25em; height:1.25em; object-fit:contain; vertical-align:-.22em; margin-right:.6em; opacity:.92; }
  .pcAv img { width:100%; height:100%; object-fit:cover; border-radius:.5em; }
  .pcCash .mIcon { width:1em; height:1em; margin-right:.35em; vertical-align:-.12em; }

  /* ---------------- HOME MENU ---------------- */
  /* compact button stack, bottom-left, clear of the baked title */
  #homeMenu { position:absolute; left:3.8vw; bottom:6vh; z-index:3; width:min(23vw,265px); }
  .mItem { display:flex; align-items:center; padding:.55vh 1vw; margin:.28vh 0; border-radius:.45em;
    font-size:min(2vw,19px); font-weight:700; letter-spacing:.02em; color:#e9dcff; cursor:pointer; border:1px solid transparent; transition:all .1s;
    text-shadow:0 2px 8px rgba(0,0,0,.7); }
  .mItem.sel { background:linear-gradient(90deg, var(--pink), rgba(255,45,149,.12)); color:#fff; border-color:rgba(255,255,255,.25);
    box-shadow:0 5px 20px rgba(255,45,149,.45); transform:translateX(5px); }
  .playerCard { position:absolute; top:4vh; right:4vw; z-index:3; display:flex; align-items:center; gap:.8vw;
    background:rgba(10,4,26,.5); border:1px solid rgba(255,255,255,.15); border-radius:.6em; padding:.9vh 1.1vw; backdrop-filter:blur(6px); }
  .playerCard .pcAv { width:min(5.5vw,46px); height:min(5.5vw,46px); border-radius:.5em; overflow:hidden; background:linear-gradient(135deg,#7b2dff,#ff2d95); }
  .playerCard .pcName { font-weight:800; font-size:min(2vw,17px); color:#fff; }
  .playerCard .pcCash { color:var(--yellow); font-weight:700; font-size:min(1.7vw,14px); }
  .playerCard .pcRank { color:#cbb8e6; font-size:min(1.5vw,12px); }
  .playerCard .pcRank b { color:var(--cyan); }
  .xpbar { width:min(11vw,120px); height:4px; border-radius:3px; background:rgba(255,255,255,.15); margin-top:.3em; overflow:hidden; }
  .xpbar>i { display:block; height:100%; width:47%; background:linear-gradient(90deg,var(--cyan),var(--pink)); }

  /* ---------------- SETTINGS / PAUSE ---------------- */
  #pauseTag { position:absolute; top:5vh; right:5vw; z-index:3; font-size:min(3.4vw,30px); font-weight:900; letter-spacing:.14em; color:var(--pink); }
  #setWrap { position:absolute; top:16vh; left:4.5vw; right:4.5vw; bottom:10vh; z-index:3; display:flex; gap:2vw; }
  #setCats { width:min(24vw,270px); flex-shrink:0; }
  .catItem { display:flex; align-items:center; gap:.8vw; padding:1.15vh 1.2vw; margin:.3vh 0; border-radius:.5em;
    font-size:min(2.3vw,20px); font-weight:700; color:#cbb8e6; border:1px solid transparent; }
  .catItem .ic { width:1.4em; text-align:center; }
  .catItem.sel { background:linear-gradient(90deg,var(--pink),rgba(255,45,149,.12)); color:#fff; box-shadow:0 4px 18px rgba(255,45,149,.35); }
  #setPanel { flex:1; background:rgba(10,4,26,.55); border:1px solid rgba(255,45,149,.4); border-radius:.8em; padding:2.2vh 2vw; overflow-y:auto; backdrop-filter:blur(6px); }
  #setPanelTitle { color:var(--pink); font-weight:800; font-size:min(3vw,26px); letter-spacing:.08em; margin-bottom:1.4vh; }
  .setRow { display:flex; align-items:center; justify-content:space-between; padding:1.15vh 1vw; border-bottom:1px solid rgba(255,255,255,.09); border-radius:.4em; }
  .setRow.sel { background:rgba(255,255,255,.07); border-color:rgba(255,45,149,.5); box-shadow:inset 0 0 0 1px rgba(255,45,149,.4); }
  .setRow .lab { font-size:min(2.3vw,20px); color:#e9dcff; font-weight:600; }
  .setRow .ctl { display:flex; align-items:center; gap:1vw; font-size:min(2.2vw,19px); color:#fff; font-weight:700; }
  .setRow .arrow { color:var(--cyan); opacity:.5; font-weight:900; }
  .setRow.sel .arrow { opacity:1; }
  .setRow .val { min-width:6em; text-align:center; color:var(--yellow); }
  .toggle { width:2.8em; height:1.5em; border-radius:99px; background:rgba(255,255,255,.2); position:relative; transition:.15s; }
  .toggle.on { background:var(--pink); }
  .toggle>i { position:absolute; top:.15em; left:.15em; width:1.2em; height:1.2em; border-radius:50%; background:#fff; transition:.15s; }
  .toggle.on>i { left:1.45em; }
  .setHints { position:absolute; bottom:2.4vh; right:5vw; z-index:3; font-size:min(2.2vw,17px); color:#b9a8d6; }
  .setHints .key { font-size:.85em; }

  /* generic press hint */
  .press { font-size:min(3vw,24px); font-weight:800; color:#fff; animation:pulse 1.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:.5;} 50%{opacity:1;} }
  .gp { font-size:min(2.2vw,16px); color:#8f7fb0; }
  .gp b { color:var(--cyan); }
</style>
</head>
<body>
<div id="game"></div>
<div id="grade"></div>

<div id="hud" class="hidden">
  <div id="objective" class="panel"><div id="objLabel">Objective</div><div id="objText">—</div><div id="dist"></div></div>
  <div id="topright" class="panel"><div id="cash">$0</div><div id="stars"></div></div>
  <div id="speedo" class="panel"><div id="speedNum">0</div><div id="speedUnit">MPH</div><div id="gearBox"></div></div>
  <div id="minimapWrap" class="panel"><canvas id="minimap" width="256" height="256"></canvas></div>
  <div id="prompt"><span id="promptBtn" class="btnGlyph glyphY">Y</span><span id="promptText">Enter vehicle</span></div>
  <div id="toast"></div>
</div>

<!-- ===================== HOME MENU ===================== -->
<div id="title" class="menuScreen hidden">
  <div class="playerCard">
    <div class="pcAv"><img src="./assets/icons/avatar.png" onerror="this.remove()"></div>
    <div>
      <div class="pcName">PLAYER1</div>
      <div class="pcCash"><img class="mIcon" src="./assets/icons/icon_cash.png" onerror="this.remove()"><span id="pcCash">$0</span></div>
      <div class="pcRank">RANK <b id="pcRank">1</b><div class="xpbar"><i id="pcXp"></i></div></div>
    </div>
  </div>
  <div id="homeMenu"></div>
</div>

<!-- ===================== PAUSE / SETTINGS ===================== -->
<div id="pause" class="menuScreen hidden">
  <div id="pauseTag">PAUSED</div>
  <div id="setWrap">
    <div id="setCats"></div>
    <div id="setPanel">
      <div id="setPanelTitle">GAMEPLAY</div>
      <div id="setRows"></div>
    </div>
  </div>
  <div class="setHints"><span class="key">B</span> Back<span style="margin:0 1.2em"></span><span class="key">A</span> Select</div>
</div>

<!-- ===================== LOADING ===================== -->
<div id="loading">
  <div id="loadingInner">
    <div id="loadtext">LOADING</div>
    <div id="loadRow">
      <div id="loadbarWrap"><div id="loadbar"></div></div>
      <div id="loadpct">0%</div>
    </div>
  </div>
</div>

<script type="importmap">
{ "imports": {
  "three": "./vendor/three.module.js",
  "three/addons/loaders/GLTFLoader.js": "./vendor/GLTFLoader.js",
  "three/addons/utils/SkeletonUtils.js": "./vendor/SkeletonUtils.js"
} }
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { clone as skeletonClone } from 'three/addons/utils/SkeletonUtils.js';

/* =========================================================================
   NEON DRIVE — GTA-style open-world sandbox (Three.js + GLB asset packs)
   Controller-first, TV-friendly.
   ========================================================================= */
const LITE=new URLSearchParams(location.search).has('lite'); // tiny world for automated tests / weak GPUs
const CFG = LITE
  ? { world:240, block:78, road:18, buildings:10, traffic:6, peds:8, coins:12, ramps:2, parkedCars:6, shadow:1024 }
  : { world:620, block:78, road:18, buildings:150, traffic:18, peds:26, coins:44, ramps:6, parkedCars:44, shadow:2048 };
const MPH = 2.23694;
const clamp=(v,a,b)=>Math.min(b,Math.max(a,v));
const lerp=(a,b,t)=>a+(b-a)*t;
const rand=(a,b)=>a+Math.random()*(b-a);
const randi=(a,b)=>Math.floor(rand(a,b+1));
const pick=a=>a[randi(0,a.length-1)];
const TAU=Math.PI*2;
const el=id=>document.getElementById(id);

// =========================================================================
//  INPUT
// =========================================================================
const Input = {
  keys:{}, pad:null, prev:{}, prevK:{}, mDown:false, mdx:0, mdy:0,
  init(){
    addEventListener('keydown',e=>{ this.keys[e.code]=true;
      if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space','Tab'].includes(e.code)) e.preventDefault(); });
    addEventListener('keyup',e=>{ this.keys[e.code]=false; });
    addEventListener('mousedown',e=>{ if(e.button===0) this.mDown=true; });
    addEventListener('mouseup',()=>{ this.mDown=false; });
    addEventListener('mousemove',e=>{ if(this.mDown){ this.mdx+=e.movementX; this.mdy+=e.movementY; } });
    addEventListener('gamepadconnected',e=>{ this.pad=e.gamepad.index; onPad(true); });
    addEventListener('gamepaddisconnected',()=>{ this.pad=null; onPad(false); });
  },
  gp(){ const p=navigator.getGamepads?navigator.getGamepads():[];
    if(this.pad!=null&&p[this.pad]) return p[this.pad];
    for(const g of p) if(g) { this.pad=g.index; return g; } return null; },
  ax(i){ const p=this.gp(); if(!p) return 0; const v=p.axes[i]||0; return Math.abs(v)<0.16?0:v; },
  bt(i){ const p=this.gp(); return !!(p&&p.buttons[i]&&p.buttons[i].pressed); },
  tr(i){ const p=this.gp(); return p&&p.buttons[i]?p.buttons[i].value:0; },
  btDown(i){ const now=this.bt(i); const was=this.prev[i]; this.prev[i]=now; return now&&!was; },
  kDown(c){ const now=!!this.keys[c]; const was=this.prevK[c]; this.prevK[c]=now; return now&&!was; },
  throttle(){ let t=this.tr(7); if(this.bt(7)) t=Math.max(t,1); if(this.keys['KeyW']||this.keys['ArrowUp']) t=1; return t; },
  brake(){ let b=this.tr(6); if(this.bt(6)) b=Math.max(b,1); if(this.keys['KeyS']||this.keys['ArrowDown']) b=1; return b; },
  steer(){ let s=this.ax(0); s=Math.sign(s)*s*s; // quadratic curve: fine control near center, full lock at edge
    if(this.keys['KeyA']||this.keys['ArrowLeft']) s-=1; if(this.keys['KeyD']||this.keys['ArrowRight']) s+=1; return clamp(s,-1,1); },
  handbrake(){ return this.bt(5)||!!this.keys['Space']; },          // GTA V: RB
  jump(){ return this.btDown(2)||this.kDown('Space'); },            // GTA V: X
  horn(){ return this.bt(10)||!!this.keys['KeyG']; },               // GTA V: L3
  headlightToggle(){ return this.btDown(15)||this.kDown('KeyH'); }, // GTA V: D-pad right
  radioCycle(){ return this.btDown(14)||this.kDown('KeyR'); },      // GTA V: D-pad left
  camCycle(){ return this.btDown(8)||this.kDown('KeyV'); },         // GTA V: View button
  moveX(){ let x=this.ax(0); if(this.keys['KeyA']||this.keys['ArrowLeft']) x-=1; if(this.keys['KeyD']||this.keys['ArrowRight']) x+=1; return clamp(x,-1,1); },
  moveY(){ let y=this.ax(1); if(this.keys['KeyW']||this.keys['ArrowUp']) y-=1; if(this.keys['KeyS']||this.keys['ArrowDown']) y+=1; return clamp(y,-1,1); },
  sprint(){ return this.bt(0)||!!this.keys['ShiftLeft']||!!this.keys['ShiftRight']; },
  camX(){ let x=this.ax(2); if(this.keys['KeyE']) x+=1; if(this.keys['KeyQ']) x-=1; x+=this.mdx*0.06; this.mdx=0; return x; },
  camY(){ let y=this.ax(3); y+=this.mdy*0.06; this.mdy=0; return y; },
  interact(){ return this.btDown(3)||this.kDown('KeyF'); },
  start(){ return this.btDown(9)||this.kDown('Escape'); },
  confirm(){ return this.btDown(0)||this.kDown('Enter')||this.kDown('Space'); },
};
// Xbox controller vibration (no-ops without a pad, actuator support, or if disabled in settings)
let RUMBLE_ON=true;
function rumble(weak=0.4, strong=0.6, ms=150){
  if(!RUMBLE_ON) return;
  const p=Input.gp(); const act=p&&(p.vibrationActuator||(p.hapticActuators&&p.hapticActuators[0]));
  if(!act||!act.playEffect) return;
  act.playEffect('dual-rumble',{duration:ms,weakMagnitude:clamp(weak,0,1),strongMagnitude:clamp(strong,0,1)}).catch(()=>{});
}

// =========================================================================
//  AUDIO
// =========================================================================
const Audio = {
  ctx:null,master:null,eOsc:null,eGain:null,sGain:null,on:false,
  init(){ if(this.ctx) return; const AC=window.AudioContext||window.webkitAudioContext; if(!AC) return;
    this.ctx=new AC(); this.master=this.ctx.createGain(); this.master.gain.value=0.9; this.master.connect(this.ctx.destination);
    this.bus=this.ctx.createGain(); this.bus.gain.value=0.6; this.bus.connect(this.master); // SFX bus (volume setting)
    this.eGain=this.ctx.createGain(); this.eGain.gain.value=0; const eg=this.ctx.createGain(); eg.gain.value=0.13;
    this.eOsc=this.ctx.createOscillator(); this.eOsc.type='sawtooth'; this.eOsc.frequency.value=60;
    const lp=this.ctx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=900;
    this.eOsc.connect(lp); lp.connect(this.eGain); this.eGain.connect(eg); eg.connect(this.bus); this.eOsc.start();
    this.sGain=this.ctx.createGain(); this.sGain.gain.value=0;
    const so=this.ctx.createOscillator(); so.type='square'; so.frequency.value=700; const sg=this.ctx.createGain(); sg.gain.value=0.04;
    so.connect(this.sGain); this.sGain.connect(sg); sg.connect(this.bus); so.start(); this.sOsc=so;
    // tire screech: looped noise through a bandpass
    const nb=this.ctx.createBuffer(1,this.ctx.sampleRate,this.ctx.sampleRate);
    const nd=nb.getChannelData(0); for(let i=0;i<nd.length;i++) nd[i]=Math.random()*2-1;
    const ns=this.ctx.createBufferSource(); ns.buffer=nb; ns.loop=true;
    const bp=this.ctx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=900; bp.Q.value=6;
    this.scGain=this.ctx.createGain(); this.scGain.gain.value=0;
    ns.connect(bp); bp.connect(this.scGain); this.scGain.connect(this.bus); ns.start();
    this.on=true;
  },
  screech(amount){ if(!this.on) return; this.scGain.gain.setTargetAtTime(clamp(amount,0,0.22), this.ctx.currentTime, 0.08); },
  horn(on){ if(!this.on) return;
    if(on&&!this.hOsc){ this.hOsc=[440,554].map(f=>{ const o=this.ctx.createOscillator(),g=this.ctx.createGain();
      o.type='square'; o.frequency.value=f; g.gain.value=0.06; o.connect(g); g.connect(this.bus); o.start(); return {o,g}; }); }

// Convert Z-up model to Y-up, scale to target, drop to ground, center x/z.
function prepareModel(scene3, {fitAxis='max', fitSize=4, yaw=0}){
  scene3.rotation.set(-Math.PI/2,0,0);       // Blender Z-up -> three Y-up
  const holder=new THREE.Group(); holder.add(scene3); holder.rotation.y=yaw;
  holder.updateMatrixWorld(true);
  let box=new THREE.Box3().setFromObject(holder), size=new THREE.Vector3(); box.getSize(size);
  const cur = fitAxis==='x'?size.x : fitAxis==='y'?size.y : fitAxis==='z'?size.z : Math.max(size.x,size.y,size.z);
  const s = cur>0.0001 ? fitSize/cur : 1; holder.scale.setScalar(s); holder.updateMatrixWorld(true);
  box=new THREE.Box3().setFromObject(holder); const ctr=new THREE.Vector3(); box.getCenter(ctr);
  holder.position.x-=ctr.x; holder.position.z-=ctr.z; holder.position.y-=box.min.y;
  holder.updateMatrixWorld(true); box=new THREE.Box3().setFromObject(holder); const fs=new THREE.Vector3(); box.getSize(fs);
  const root=new THREE.Group(); root.add(holder);
  root.traverse(o=>{ if(o.isMesh){ o.castShadow=true; o.receiveShadow=true; if(o.material){ o.material.side=THREE.FrontSide; } } });
  root.userData.dim={x:fs.x,y:fs.y,z:fs.z};
  return root;
}

class Character {
  constructor(kind, opts={}){
    this.group=new THREE.Group();
    const proto=CHAR_PROTO[kind]||CHAR_PROTO.male;
    if(!proto){ // fallback capsule if character failed to load
      const t=new THREE.Mesh(new THREE.CapsuleGeometry(0.35,0.9,4,8),new THREE.MeshStandardMaterial({color:0x22d3a5}));
      t.position.y=1.05; t.castShadow=true; this.group.add(t); this.bones=null; return;
    }
    const rig=skeletonClone(proto);
    // per-instance materials so tints don't leak between clones; vary peds by skin tone
    rig.traverse(o=>{ if(o.isSkinnedMesh&&o.material){ o.material=o.material.clone();
      if(opts.skinTint&&/superhero|retopology|face/i.test(o.name)) o.material.color.setHex(opts.skinTint);
    } });
    this.group.add(rig);
    this.bones={};
    rig.traverse(o=>{ if(o.isBone) this.bones[o.name]=o; });
    this.base={};
    for(const n of ['thigh_l','thigh_r','calf_l','calf_r','upperarm_l','upperarm_r','lowerarm_l','lowerarm_r','spine_01','Head']){
      if(this.bones[n]) this.base[n]=this.bones[n].rotation.clone();

    const b=this.bones; if(!b) return;
    if(b.upperarm_l) b.upperarm_l.rotation.z=this.base.upperarm_l.z-1.15;
    if(b.upperarm_r) b.upperarm_r.rotation.z=this.base.upperarm_r.z+1.15;
    if(b.lowerarm_l) b.lowerarm_l.rotation.z=this.base.lowerarm_l.z-0.12;

    if(b.calf_r)  b.calf_r.rotation.x =this.base.calf_r.x - Math.max(0, s)*0.95*k;
    // arms swing opposite to the same-side leg
    if(b.upperarm_l) b.upperarm_l.rotation.x=this.base.upperarm_l.x - s*0.42*k;
    if(b.upperarm_r) b.upperarm_r.rotation.x=this.base.upperarm_r.x + s*0.42*k;
    if(b.lowerarm_l) b.lowerarm_l.rotation.x=this.base.lowerarm_l.x - 0.25*k;

  let lamps=0;
  for(const c of coords){ for(const d of coords){
    if(Math.abs(c)>W-24||Math.abs(d)>W-24) continue;
    // sidewalk corners of this intersection get greenery + fixtures (colliders on the solid ones)
    if(Math.random()<0.7) place(Math.random()<0.55?'palm_tall':'tree', c+13, d+13, rand(0,TAU), 0.7);
    if(Math.random()<0.6) place(Math.random()<0.5?'palm_short':'tree', c-13, d+13, rand(0,TAU), 0.7);
    if(lamps<90 && Math.random()<0.7){ place('lamp', c-13, d-13, rand(0,TAU)); lamps++; }
    if(Math.random()<0.35) place('hydrant', c+13, d-13, rand(0,TAU), 0.4);
    if(Math.random()<0.25) place('booth', c+11, d-11, rand(0,TAU), 0.6);
    if(Math.random()<0.3) place('bin', c-11, d+11, rand(0,TAU), 0.4);
    if(Math.random()<0.3) place('bench', c+11, d+11, pick([0,Math.PI/2]), 0.9);
    if(Math.random()<0.22) place('dumpster', c+rand(-6,6), d+rand(-6,6), pick([0,Math.PI/2]), 1.1);
  }}
  // ---- parked cars along the curbs: big density boost, all solid ----
  let parkedDecor=0;
  for(const line of roadLines){ if(parkedDecor>=CFG.parkedCars) break;
    for(let t=0;t<3 && parkedDecor<CFG.parkedCars;t++){
      const off=CFG.road*0.55*(Math.random()<0.5?1:-1); // at the curb, clear of the driving lanes
      let x,z,ry;
      if(line.dir==='h'){ x=rand(-W+40,W-40); z=line.z+off; ry=off>0?0:Math.PI; }
      else { z=rand(-W+40,W-40); x=line.x+off; ry=off>0?-Math.PI/2:Math.PI/2; }
      if(blocked(x,z,3)) continue;
      if(Math.random()<0.4) continue; // leave gaps
      const car=inst(pick(CAR_KEYS)); car.position.set(x,0,z); car.rotation.y=ry; world.add(car);
      colliders.push({x,z,hw:1.2,hd:2.4}); parkedDecor++;
    }
  }
  // ramps on some roads
  for(let i=0;i<CFG.ramps;i++){ const r=inst('ramp'); const line=pick(roadLines);
    if(line.dir==='h'){ r.position.set(rand(-W+40,W-40),0,line.z); r.rotation.y=Math.PI/2; }
    else { r.position.set(line.x,0,rand(-W+40,W-40)); r.rotation.y=0; }
    r.userData.ramp=true; world.add(r); ramps.push(r); }
}

// =========================================================================
//  COLLISION
// =========================================================================
function resolve(x,z,hw,hd){
  for(const b of colliders){ const dx=x-b.x, dz=z-b.z; const ox=(b.hw+hw)-Math.abs(dx), oz=(b.hd+hd)-Math.abs(dz);
    if(ox>0&&oz>0){ if(ox<oz) x=b.x+Math.sign(dx||1)*(b.hw+hw); else z=b.z+Math.sign(dz||1)*(b.hd+hd); return {hit:true,x,z}; } }
  return {hit:false,x,z};
}
function blocked(x,z,pad=1){ for(const b of colliders) if(Math.abs(x-b.x)<b.hw+pad&&Math.abs(z-b.z)<b.hd+pad) return true; return false; }

// =========================================================================
//  VEHICLE
// =========================================================================
const ramps=[];
function makeCarLights(mesh,d){
  const hw=Math.max(0.4,d.x*0.34), y=Math.max(0.45,d.y*0.42), fz=d.z*0.5-0.06, bz=-d.z*0.5+0.06;
  const mk=(w,h,color,x,z)=>{ const m=new THREE.Mesh(new THREE.PlaneGeometry(w,h),
      new THREE.MeshBasicMaterial({color,transparent:true,opacity:0.95})); m.position.set(x,y,z); m.rotation.y=z>0?0:Math.PI; m.renderOrder=2; mesh.add(m); return m; };
  return { head:[mk(0.32,0.15,0x99884d,-hw,fz),mk(0.32,0.15,0x99884d,hw,fz)],
           tail:[mk(0.34,0.14,0x4a0d0d,-hw,bz),mk(0.34,0.14,0x4a0d0d,hw,bz)],
           rev:[mk(0.16,0.1,0x111111,-hw*0.55,bz),mk(0.16,0.1,0x111111,hw*0.55,bz)] };
}
class Car {
  constructor(key,x,z,police=false){
    this.key=key; this.mesh=carInst(key); world.add(this.mesh);
    this.pos=new THREE.Vector3(x,0,z); this.heading=0; this.speed=0; this.lateral=0; this.y=0; this.vy=0;
    this.police=police; this.maxSpeed=police?50:56; this.hw=1.15; this.hd=2.3; this.wheelSpin=0; this._brake=0;
    this.wheels=this.mesh.userData.wheels||[]; this.wheelBase=this.mesh.userData.wheelBase||[];
    this.lights=makeCarLights(this.mesh, this.mesh.userData.dim||{x:2,y:1.4,z:4.6});
    if(police){ const bar=new THREE.Group();
      const rl=new THREE.Mesh(new THREE.BoxGeometry(0.5,0.24,0.36),new THREE.MeshBasicMaterial({color:0xff2222})); rl.position.x=-0.42;
      const bl=new THREE.Mesh(new THREE.BoxGeometry(0.5,0.24,0.36),new THREE.MeshBasicMaterial({color:0x2266ff})); bl.position.x=0.42;
      bar.add(rl,bl); bar.position.set(0,(this.mesh.userData.dim?.y||1.4)+0.15,0.2); this.mesh.add(bar); this.lightbar={rl,bl}; }
  }
  updateLights(){
    const rev=this.speed<-0.3, brk=this._brake>0.12 && this.speed>-0.3;
    for(const t of this.lights.tail) t.material.color.setHex(brk?0xff2a2a:(TOD.headlights?0x8a1010:0x4a0d0d));
    for(const r of this.lights.rev) r.material.color.setHex(rev?0xf4f4ff:0x111111);
    for(const h of this.lights.head) h.material.color.setHex(TOD.headlights?0xfff0c8:0x99884d);
  }
  get forward(){ return new THREE.Vector3(Math.sin(this.heading),0,Math.cos(this.heading)); }
  drive(dt,thr,brk,steer,hb){
    const accel=32,brakePow=48,rev=18;
    if(thr>0.02) this.speed+=accel*thr*dt;
    if(brk>0.02){ if(this.speed>0.4) this.speed-=brakePow*brk*dt; else this.speed-=rev*brk*dt; }
    if(thr<0.02&&brk<0.02) this.speed-=Math.sign(this.speed)*Math.min(Math.abs(this.speed),10*dt);
    this.speed=clamp(this.speed,-20,this.maxSpeed);
    const steerAmt=steer*(1.0-clamp(Math.abs(this.speed)/this.maxSpeed,0,1)*0.55);
    if(Math.abs(this.speed)>0.3) this.heading+=steerAmt*dt*2.8*Math.sign(this.speed);
    if(hb&&Math.abs(this.speed)>6){ this.lateral+=steer*Math.abs(this.speed)*1.0*dt; this.speed*=(1-0.4*dt); }
    this.lateral*=hb?0.95:0.82;
    this._steer=steer; this._brake=brk; this._hb=hb;
  }
  integrate(dt){
    const f=this.forward, r=new THREE.Vector3(f.z,0,-f.x);
    let nx=this.pos.x+(f.x*this.speed+r.x*this.lateral)*dt;
    let nz=this.pos.z+(f.z*this.speed+r.z*this.lateral)*dt;
    const hit=resolve(nx,nz,this.hw+0.2,this.hd+0.2);
    this.impact=0;
    if(hit.hit){ nx=hit.x; nz=hit.z; const sp=Math.abs(this.speed);
      if(sp>12){ Audio.thud(sp/45); this.impact=sp; this.speed=-this.speed*0.25; } // bounce off walls
      else this.speed*=0.4;
      this.lateral*=0.3; }
    nx=clamp(nx,-W+6,W-6); nz=clamp(nz,-W+6,W-6);
    this.pos.set(nx,0,nz);
    // ramp jump
    this.justJumped=false; this.justLanded=false;
    if(this.y<=0.01){ for(const rp of ramps){ if(Math.abs(nx-rp.position.x)<3&&Math.abs(nz-rp.position.z)<3&&Math.abs(this.speed)>16){ this.vy=Math.min(Math.abs(this.speed)*0.28,10); this.justJumped=true; Audio.blip(500,0.15,'sawtooth',0.2); break; } } }
    const wasAir=this.y>0.05;
    this.vy-=26*dt; this.y+=this.vy*dt; if(this.y<0){ if(wasAir) this.justLanded=true; this.y=0; this.vy=0; }
    // subtle suspension lean from steering + speed
    this.mesh.position.set(nx,this.y,nz); this.mesh.rotation.set(this.vy*0.012,this.heading,(this._steer||0)*-0.045*clamp(Math.abs(this.speed)/20,0,1));
    // wheels roll and front wheels steer
    this.wheelSpin+=this.speed*dt*1.7;
    for(let i=0;i<this.wheels.length;i++){ const w=this.wheels[i], b=this.wheelBase[i]; if(!b) continue;
      w.rotation.x=b.x+this.wheelSpin; w.rotation.y=b.y+(i<2?(this._steer||0)*0.45:0); }
    this.updateLights();
    if(this.lightbar){ const t=performance.now()*0.006; const on=Math.sin(t)>0; this.lightbar.rl.material.color.setRGB(on?1:.15,.05,.05); this.lightbar.bl.material.color.setRGB(.05,.05,on?.15:1); }
  }
  remove(){ world.remove(this.mesh); }
}

const traffic=[], peds=[];
function spawnTraffic(){ const line=pick(roadLines); const off=CFG.road*0.24; let x,z,heading;
  if(line.dir==='h'){ x=rand(-W+30,W-30); const s=Math.random()<0.5; z=line.z+(s?off:-off); heading=s?Math.PI/2:-Math.PI/2; }
  else { z=rand(-W+30,W-30); const s=Math.random()<0.5; x=line.x+(s?off:-off); heading=s?0:Math.PI; }
  if(blocked(x,z,3)) return; const c=new Car(pick(CAR_KEYS),x,z); c.heading=heading; c.ai={line,cruise:rand(15,26)}; c.speed=c.ai.cruise; traffic.push(c); }
function updTraffic(c,dt){ const f=c.forward;
  // brake for whatever is ahead: player car, parked cars, other traffic, the player on foot
  let ahead=null, aheadD=12;
  const candidates=traffic.concat(parked, player.inCar?[player.inCar]:[]);
  for(const o of candidates){ if(o===c) continue;
    const to=new THREE.Vector3().subVectors(o.pos,c.pos); const d=to.length();
    if(d<aheadD && to.normalize().dot(f)>0.75){ ahead=o; aheadD=d; } }
  if(!player.inCar){ const to=new THREE.Vector3().subVectors(player.pos,c.pos); const d=to.length();
    if(d<aheadD && to.normalize().dot(f)>0.7){ ahead=player; aheadD=d; } }
  const target = ahead ? (aheadD<6?0:c.ai.cruise*clamp((aheadD-6)/6,0,1)) : c.ai.cruise;
  c._brake = target<c.speed-1 ? 1 : 0; // brake lights when slowing for something
  c.speed=lerp(c.speed,target,dt*(ahead?4:1.5));
  let nx=c.pos.x+f.x*c.speed*dt, nz=c.pos.z+f.z*c.speed*dt;
  if(resolve(nx,nz,c.hw,c.hd).hit){ c.heading+=Math.PI/2; c.speed*=0.5; nx=c.pos.x; nz=c.pos.z; }
  if(Math.abs(nx)>W-14||Math.abs(nz)>W-14){ c.heading+=Math.PI; nx=clamp(nx,-W+16,W-16); nz=clamp(nz,-W+16,W-16); }
  c.pos.set(nx,0,nz); c.mesh.position.set(nx,0,nz); c.mesh.rotation.y=c.heading;
  c.wheelSpin+=c.speed*dt*1.7;
  for(let i=0;i<c.wheels.length;i++){ const w=c.wheels[i], b=c.wheelBase[i]; if(b) w.rotation.x=b.x+c.wheelSpin; }
  c.updateLights(); }
function spawnPed(){ let x,z,t=0; const coords=window.__coords||[0];
  do{ const c=pick(coords),d=pick(coords); x=c+rand(CFG.road*0.6,CFG.road*1.2); z=d+rand(CFG.road*0.6,CFG.road*1.2); t++; } while(blocked(x,z,1)&&t<8);
  const char=new Character(Math.random()<0.5?'male':'female',{ skinTint:pick(SKIN_TONES), clothTint:pick(CLOTH_TINTS) });
  const g=new THREE.Group(); g.add(char.group);
  g.position.set(x,0,z); scene.add(g);
  peds.push({mesh:g,char,pos:new THREE.Vector3(x,0,z),heading:rand(0,TAU),speed:rand(1,2.2),t:rand(0,5),phase:rand(0,TAU)}); }
function updPed(p,dt){
  // knocked down: lie flat, then get back up
  if(p.down>0){ p.down-=dt;
    p.mesh.rotation.x=-Math.PI/2; p.mesh.position.set(p.pos.x,0.25,p.pos.z);
    if(p.down<=0){ p.down=0; p.mesh.rotation.x=0; p.panic=4; }
    return; }
  // panic: flee from the player's speeding car
  const pc=player.inCar;
  if(pc&&Math.abs(pc.speed)>10&&p.pos.distanceTo(pc.pos)<14){
    const away=new THREE.Vector3().subVectors(p.pos,pc.pos).setY(0);
    p.heading=Math.atan2(away.x,away.z); p.panic=Math.max(p.panic||0,1.2);
    if(!p.screamed||p.screamed<performance.now()-4000){ p.screamed=performance.now(); if(Math.random()<0.5) Audio.blip(rand(700,1100),0.25,'sawtooth',0.12); }
  }
  if(p.panic>0) p.panic-=dt;
  const spd=p.panic>0?4.2:p.speed;
  p.t-=dt; if(p.t<=0&&p.panic<=0){ p.heading+=rand(-1.4,1.4); p.t=rand(2,5); }
  const f=new THREE.Vector3(Math.sin(p.heading),0,Math.cos(p.heading)); let nx=p.pos.x+f.x*spd*dt, nz=p.pos.z+f.z*spd*dt;
  if(blocked(nx,nz,0.8)||Math.abs(nx)>W-4||Math.abs(nz)>W-4){ p.heading+=Math.PI*0.7; nx=p.pos.x; nz=p.pos.z; }
  p.pos.set(nx,0,nz); p.mesh.position.set(nx,0,nz); p.mesh.rotation.y=p.heading;
  p.phase+=dt*spd*2.6; p.char.walk(p.phase, clamp(spd/2.2,0.4,1.2)); }

// =========================================================================
//  CAMERA  (chase cam, auto-behind, TV-friendly)
// =========================================================================
// GTA-style chase cam: low and close behind the character, View button cycles distance
const CAM_MODES=[
  { name:'NEAR', carD:8.5,  carH:2.9, footD:3.6, footH:1.9 },
  { name:'MID',  carD:12,   carH:4.0, footD:5.2, footH:2.6 },
  { name:'FAR',  carD:16,   carH:5.6, footD:7.5, footH:3.6 },
];
const cam={ yaw:0, footYaw:0, pitch:0.18, manual:0, look:new THREE.Vector3(), shake:0, mode:0 };
function updateCamera(dt){
  const av=player.inCar; const focus=(av?av.pos:player.pos);
  const focusY=(av?av.y:(player.y||0));
  const mode=CAM_MODES[cam.mode];
  // GTA-standard (non-inverted) defaults: right→pan right, up→look up. Toggles flip each axis.
  const rawX=Input.camX(), rawY=Input.camY();
  const mx=rawX*SET.lookSens*2.5*(SET.invertX?-1:1)*dt, my=rawY*SET.lookSens*1.2*(SET.invertY?-1:1)*dt;
  if(av && SET.autoCam){ // recenter behind car; right stick nudges temporarily
    cam.manual=lerp(cam.manual,0,dt*2.2)+mx;
    cam.pitch=clamp(cam.pitch+my,0.02,0.85);
    cam.yaw=av.heading+cam.manual;
  } else { // free orbit (on foot, or in-car with auto-center off)
    cam.footYaw+=mx; cam.pitch=clamp(cam.pitch+my,0.02,0.85);
    if(!av && player.speed>1.0 && Math.abs(rawX)<0.05){ // gentle trail behind, only when not steering camera
      let dy=player.heading-cam.footYaw; while(dy>Math.PI)dy-=TAU; while(dy<-Math.PI)dy+=TAU;
      cam.footYaw+=dy*clamp(dt*0.7,0,1);
    }
    cam.yaw=cam.footYaw;
  }
  const fwd=new THREE.Vector3(Math.sin(cam.yaw),0,Math.cos(cam.yaw));
  const spK=av?clamp(Math.abs(av.speed)/45,0,1):0;
  const dist=(av?mode.carD:mode.footD)+spK*3;
  const height=(av?mode.carH:mode.footH)+cam.pitch*4.5;
  let desired=new THREE.Vector3(focus.x-fwd.x*dist, focus.y+focusY+height, focus.z-fwd.z*dist);
  if(desired.y<1.2) desired.y=1.2;
  // building occlusion: if a tower blocks the view, pull the camera in front of it
  for(let t=1;t>=0.35;t-=0.13){
    const px=focus.x+(desired.x-focus.x)*t, pz=focus.z+(desired.z-focus.z)*t;
    if(!blocked(px,pz,0.5)){ if(t<1){ desired.x=focus.x+(desired.x-focus.x)*t; desired.z=focus.z+(desired.z-focus.z)*t; desired.y=Math.max(1.2,focus.y+focusY+height*Math.max(t,0.55)); } break; }
  }
  camera.position.lerp(desired,clamp(dt*(av?7:9),0,1));
  // impact shake
  if(cam.shake>0.001){ camera.position.x+=rand(-1,1)*cam.shake*0.5; camera.position.y+=rand(-1,1)*cam.shake*0.35; camera.position.z+=rand(-1,1)*cam.shake*0.5; cam.shake*=Math.exp(-dt*6); } else cam.shake=0;
  // look well ahead so the character sits low-center in frame, GTA-style
  const look=new THREE.Vector3(focus.x+fwd.x*(av?6:6), focus.y+focusY+(av?1.3:1.55), focus.z+fwd.z*(av?6:6));
  cam.look.lerp(look,clamp(dt*8,0,1)); camera.lookAt(cam.look);
  const fov=(av?62:58)+spK*13; camera.fov=lerp(camera.fov,fov,dt*3); camera.updateProjectionMatrix();
  sun.target.position.set(focus.x,0,focus.z);
  sun.position.set(focus.x+TOD.sunDir.x*300, 60+TOD.sunDir.y*320, focus.z+TOD.sunDir.z*300); // sun follows time-of-day → shadows move
}

// Minimap — NORTH-UP (world fixed, player rotates). Reliable & readable.
const mm=el('minimap'),mx=mm.getContext('2d'); const MM_R=95; // meters shown from center
function drawMinimap(){
  const cx=mm.width/2, cy=mm.height/2, sc=cx/MM_R;
  mx.clearRect(0,0,mm.width,mm.height); mx.fillStyle='#0a0620'; mx.fillRect(0,0,mm.width,mm.height);
  const ref=player.inCar?player.inCar.pos:player.pos;
  const toX=wx=>cx+(wx-ref.x)*sc, toY=wz=>cy+(wz-ref.z)*sc;
  // roads
  mx.strokeStyle='rgba(130,120,160,0.55)'; mx.lineWidth=Math.max(2,CFG.road*sc*0.7);
  for(const l of roadLines){ mx.beginPath(); if(l.dir==='h'){ const y=toY(l.z); if(y<-5||y>mm.height+5) continue; mx.moveTo(0,y); mx.lineTo(mm.width,y);} else { const x=toX(l.x); if(x<-5||x>mm.width+5) continue; mx.moveTo(x,0); mx.lineTo(x,mm.height);} mx.stroke(); }
  // buildings
  mx.fillStyle='rgba(70,64,92,0.9)';
  for(const b of colliders){ const x=toX(b.x),y=toY(b.z); if(x<-20||x>mm.width+20||y<-20||y>mm.height+20) continue; mx.fillRect(x-b.hw*sc,y-b.hd*sc,b.hw*2*sc,b.hd*2*sc); }
  // coins
  mx.fillStyle='#ffd23f'; for(const c of coins){ if(c.taken) continue; const x=toX(c.pos.x),y=toY(c.pos.z); if(x<0||x>mm.width||y<0||y>mm.height) continue; mx.fillRect(x-1.5,y-1.5,3,3); }
  // traffic
  mx.fillStyle='#6cf'; for(const c of traffic){ const x=toX(c.pos.x),y=toY(c.pos.z); if(x<0||x>mm.width||y<0||y>mm.height) continue; mx.beginPath(); mx.arc(x,y,2,0,TAU); mx.fill(); }
  // your parked car(s) — clamped to the edge so you can always find your ride
  mx.fillStyle='#39ff88'; for(const c of parked){ mx.beginPath(); mx.arc(clamp(toX(c.pos.x),5,mm.width-5),clamp(toY(c.pos.z),5,mm.height-5),3.5,0,TAU); mx.fill(); }
  // police
  mx.fillStyle='#ff3b3b'; for(const c of State.police){ mx.beginPath(); mx.arc(clamp(toX(c.pos.x),4,mm.width-4),clamp(toY(c.pos.z),4,mm.height-4),3,0,TAU); mx.fill(); }
  // mission marker (clamped to edge)
  if(State.mission){ const t=State.mission.phase==='pickup'?State.mission.pickup:State.mission.drop; mx.fillStyle=State.mission.phase==='pickup'?'#ffd23f':'#39ff88'; mx.beginPath(); mx.arc(clamp(toX(t.x),6,mm.width-6),clamp(toY(t.z),6,mm.height-6),5,0,TAU); mx.fill(); }
  // player triangle (rotates with heading; north is up)
  const hd=player.inCar?player.inCar.heading:player.heading;
  mx.save(); mx.translate(cx,cy); mx.rotate(-hd+Math.PI); // heading 0 (+Z / south) points down
  mx.fillStyle='#fff'; mx.beginPath(); mx.moveTo(0,-8); mx.lineTo(-5,7); mx.lineTo(5,7); mx.closePath(); mx.fill(); mx.restore();
}

//  ENTER / EXIT
// =========================================================================
const parked=[]; // cars the player left — stay in the world and can be re-entered
function nearestCar(maxD){ let best=null,bd=maxD;
  for(const c of traffic.concat(State.police,parked)){ const d=c.pos.distanceTo(player.pos); if(d<bd){ bd=d; best=c; } }
  return best; }
// throw the occupant out when you jack a moving/occupied car (GTA-style)
function ejectDriver(c){
  const proto=CHAR_PROTO.male; if(!proto){ return; }
  const left=new THREE.Vector3(-Math.cos(c.heading),0,Math.sin(c.heading)); // driver door side
  const pos=c.pos.clone().addScaledVector(left,2.9); pos.y=0;  // thrown clear of the car
  const char=new Character(Math.random()<0.5?'male':'female',{skinTint:pick(SKIN_TONES),clothTint:pick(CLOTH_TINTS)});
  const g=new THREE.Group(); g.add(char.group); g.position.copy(pos); scene.add(g);
  const away=left.clone();
  peds.push({mesh:g,char,pos,heading:Math.atan2(away.x,away.z),speed:rand(1.8,2.6),t:rand(1,2),phase:0,down:2.0,downDir:away,panic:6,screamed:0});
  Audio.thud(0.5); toast('Carjacked',1100);
}
function enterCar(c){
  const wasOccupied = traffic.includes(c) || State.police.includes(c); // parked cars are empty
  player.inCar=c; player.mesh.visible=false;
  for(const list of [traffic,parked]){ const i=list.indexOf(c); if(i>=0) list.splice(i,1); }
  const pi=State.police.indexOf(c); if(pi>=0) State.police.splice(pi,1);
  if(wasOccupied) ejectDriver(c);
  if(c.police){ addWanted(2); toast('Grand theft: police cruiser'); }
  c.ai=null; hidePrompt(); Audio.blip(660,0.1,'sine',0.25); rumble(0.3,0.5,120); }
function exitCar(){ const c=player.inCar; if(!c) return;
  // try right side, then left, then behind — never exit into a wall
  const right=new THREE.Vector3(Math.cos(c.heading),0,-Math.sin(c.heading));
  const back=c.forward.clone().negate();
  let spot=null;
  for(const off of [right.clone().multiplyScalar(2.6), right.clone().multiplyScalar(-2.6), back.clone().multiplyScalar(3.6)]){
    const p=c.pos.clone().add(off); if(!blocked(p.x,p.z,0.6)){ spot=p; break; }
  }
  if(!spot) spot=c.pos.clone().add(right.multiplyScalar(2.6));
  player.pos.copy(spot); player.pos.y=0; player.heading=c.heading; player.mesh.visible=true; player.inCar=null;
  c.speed=0; c.lateral=0;
  parked.push(c); // stays where you left it — walk back up and press Y to get back in
  cam.footYaw=c.heading; hidePrompt(); Audio.blip(440,0.1,'sine',0.25); }

let legPhase=0;
function updateFoot(dt){
  const mxv=Input.moveX(), myv=Input.moveY(), mag=Math.hypot(mxv,myv), sprint=Input.sprint(), spd=sprint?7.5:4.0;
  if(mag>0.12){ const cf=new THREE.Vector3(Math.sin(cam.yaw),0,Math.cos(cam.yaw)), cr=new THREE.Vector3(cf.z,0,-cf.x);
    const dir=new THREE.Vector3().addScaledVector(cr,mxv).addScaledVector(cf,-myv);
    if(dir.lengthSq()>0.001){ dir.normalize(); player.heading=Math.atan2(dir.x,dir.z);
      let nx=player.pos.x+dir.x*spd*dt, nz=player.pos.z+dir.z*spd*dt;
      if(!blocked(nx,nz,0.6)){ player.pos.x=clamp(nx,-W+4,W-4); player.pos.z=clamp(nz,-W+4,W-4); } legPhase+=dt*spd*mag*2.4; }
    player.speed=spd*mag;
  } else player.speed=0;
  // jump (GTA V: X button)
  if(Input.jump()&&player.y<=0.01){ player.vy=5.4; rumble(0.1,0.2,80); }
  player.vy=(player.vy||0)-16*dt; player.y=Math.max(0,(player.y||0)+player.vy*dt);
  if(player.y===0&&player.vy<0) player.vy=0;
  player.mesh.position.copy(player.pos); player.mesh.position.y=player.y; player.mesh.rotation.y=player.heading;
  if(player.char) player.char.walk(legPhase, player.speed>0.1?clamp(player.speed/7.5,0.45,1):0);
  const c=nearestCar(6.0); if(c){ showPrompt('Enter vehicle'); if(Input.interact()) enterCar(c); } else hidePrompt();
  Audio.engine(0,false);
}
function updateDrive(dt){
  const c=player.inCar; const hb=Input.handbrake();
  c.drive(dt,Input.throttle(),Input.brake(),clamp(Input.steer()*SET.steerSens,-1,1),hb); c.integrate(dt);
  // pseudo-gearbox: rpm saws up through each "gear" as speed climbs
  const sp=Math.abs(c.speed), GEAR=13;
  const rpm=0.25 + ((sp%GEAR)/GEAR)*0.75;
  Audio.engine(rpm*(0.4+0.6*clamp(sp/8,0,1)) + (Input.throttle()>0.1?0.1:0), true);
  // tire screech when drifting or braking hard at speed
  const sliding=(hb&&sp>8)||Math.abs(c.lateral)>4||(Input.brake()>0.5&&sp>18);
  Audio.screech(sliding?0.12+Math.abs(c.lateral)*0.01:0);
  // crash feedback: rumble + camera shake scale with impact
  if(c.impact>0){ rumble(clamp(c.impact/40,0.2,1), clamp(c.impact/30,0.3,1), 220); cam.shake=Math.min(0.8,c.impact/50); }
  if(c.justJumped) rumble(0.2,0.35,120);
  if(c.justLanded){ rumble(0.5,0.7,180); cam.shake=Math.max(cam.shake,0.25); }
  carFX(c,dt);
  // pedestrians get knocked down, not teleported
  for(const p of peds){ if(!p.down&&p.pos.distanceTo(c.pos)<2.2&&sp>6){
    p.down=4; p.downDir=new THREE.Vector3().subVectors(p.pos,c.pos).setY(0).normalize();
    p.pos.addScaledVector(p.downDir,1.5);
    addWanted(1); Audio.thud(0.6); rumble(0.4,0.6,150); toast('Watch the pedestrians',1400); } }
  for(const t of traffic){ if(t.pos.distanceTo(c.pos)<3.4&&sp>12){ const push=new THREE.Vector3().subVectors(t.pos,c.pos).setY(0).normalize().multiplyScalar(2); t.pos.add(push); if(Math.random()<0.25) addWanted(1); Audio.thud(0.5); rumble(0.3,0.5,140); } }
  showPrompt('Exit vehicle'); if(Input.interact()){ hidePrompt(); Audio.screech(0); exitCar(); }
}
function collectCoins(){ const ref=player.inCar?player.inCar.pos:player.pos; for(const c of coins){ if(c.taken) continue; c.mesh.rotation.y+=0.06; c.mesh.position.y=1.2+Math.sin(performance.now()*0.004+c.pos.x)*0.15;
  if(ref.distanceTo(c.pos)<(player.inCar?3:2)){ c.taken=true; c.mesh.visible=false; State.cash+=25; renderCash(); Audio.cash(); rumble(0.15,0.1,70); } } }
function checkMission(){ if(!State.mission) return; const ref=player.inCar?player.inCar.pos:player.pos; const t=State.mission.phase==='pickup'?State.mission.pickup:State.mission.drop;
  const d=Math.hypot(ref.x-t.x,ref.z-t.z); if(State.objPos) distEl.textContent=`${Math.round(d)} m`; if(State.mission.marker) State.mission.marker.children[0].rotation.y+=0.02; if(d<3.6) missionPhase(); }

let last=performance.now();
function animate(now){ requestAnimationFrame(animate); let dt=(now-last)/1000; last=now; dt=Math.min(dt,0.05);
  updateTOD(dt); updateFX(dt); if(player.inCar) wetGround.position.set(player.inCar.pos.x,0.06,player.inCar.pos.z); else wetGround.position.set(player.pos.x,0.06,player.pos.z);
  if(State.mode==='play'){
    if(bustCd>0) bustCd-=dt;
    if(Input.start()) pause();
    // GTA V extras: camera mode (View), radio (D-pad left), headlights (D-pad right), horn (L3)
    if(Input.camCycle()){ cam.mode=(cam.mode+1)%CAM_MODES.length; toast('Camera: '+CAM_MODES[cam.mode].name,1000); }
    if(Input.radioCycle()){ toast('Radio: '+Radio.cycle(),1400); Audio.blip(1200,0.05,'sine',0.15); }
    if(player.inCar){
      if(Input.headlightToggle()){ State.lightsOn=!State.lightsOn; toast('Headlights '+(State.lightsOn?'on':'off'),900); }
      Audio.horn(Input.horn());
      if(Input.horn()){ for(const p of peds){ if(p.pos.distanceTo(player.inCar.pos)<10&&!p.down) p.panic=Math.max(p.panic||0,0.8); } }
    } else Audio.horn(false);
    if(player.inCar) updateDrive(dt); else updateFoot(dt);
    for(const c of traffic) updTraffic(c,dt);
    for(const p of peds) updPed(p,dt);
    collectCoins();
    if(State.wanted>0){ State.wtimer-=dt*(SET.difficulty==='EASY'?1.7:SET.difficulty==='HARD'?0.6:1); if(State.wtimer<=0) setWanted(State.wanted-1); Audio.siren(State.police.length>0); for(const c of State.police) updPolice(c,dt); if(State.police.length<State.wanted&&Math.random()<0.01) spawnPolice(); }
    else { Audio.siren(false); if(State.police.length) clearPolice(); }
    checkMission(); updateCamera(dt); drawMinimap();
    const av=player.inCar; const conv=SET.units==='KMH'?3.6:MPH;
    speedNum.textContent=av?Math.round(Math.abs(av.speed)*conv):0;
    speedUnitEl.textContent=SET.units;
    gearBox.textContent=av?(av.speed<-0.5?'REVERSE':av.speed<0.5?'NEUTRAL':'DRIVE'):'ON FOOT';
    // headlights follow the player's car (auto at night; D-pad right forces on/off)
    if(av&&State.lightsOn!==false&&TOD.headlights){ const f=av.forward; headlight.intensity=150;
      headlight.position.set(av.pos.x+f.x*2.1, av.y+1.0, av.pos.z+f.z*2.1);
      headlight.target.position.set(av.pos.x+f.x*18, 0.4, av.pos.z+f.z*18); }
    else headlight.intensity=0;
  } else if(State.mode==='title'){ cam.footYaw+=dt*0.12; cam.yaw=cam.footYaw; updateCamera(dt); }
  renderer.render(scene,camera);
}

function setFullscreen(v){ try{ if(v){ const d=document.documentElement; (d.requestFullscreen||d.webkitRequestFullscreen||(()=>{})).call(d); }
  else { (document.exitFullscreen||document.webkitExitFullscreen||(()=>{})).call(document); } }catch(e){} }

function applyOne(key){ switch(key){
  case 'minimap': el('minimapWrap').style.display=SET.minimap==='OFF'?'none':''; break;
  case 'shadows':
    if(SET.shadows==='OFF') renderer.shadowMap.enabled=false;

      if(sun.shadow.mapSize.x!==sz){ sun.shadow.mapSize.set(sz,sz); if(sun.shadow.map){ sun.shadow.map.dispose(); sun.shadow.map=null; } } }
    renderer.shadowMap.needsUpdate=true; break;
  case 'drawDist': { DRAW_MUL={NEAR:0.7,MED:1.0,FAR:1.5}[SET.drawDist]; camera.far=2600*DRAW_MUL; camera.updateProjectionMatrix(); break; }
  case 'timeOfDay': TOD.mode=SET.timeOfDay; break;

const Nav={ t:0, last:'',
  dir(){ const now=performance.now(); let d='';
    const up=Input.bt(12)||Input.keys['ArrowUp']||Input.keys['KeyW']||Input.ax(1)<-0.5;
    const dn=Input.bt(13)||Input.keys['ArrowDown']||Input.keys['KeyS']||Input.ax(1)>0.5;
    const lf=Input.bt(14)||Input.keys['ArrowLeft']||Input.keys['KeyA']||Input.ax(0)<-0.5;
    const rt=Input.bt(15)||Input.keys['ArrowRight']||Input.keys['KeyD']||Input.ax(0)>0.5;
    if(up)d='up'; else if(dn)d='down'; else if(lf)d='left'; else if(rt)d='right';
    if(!d){ this.last=''; return ''; }
    if(d!==this.last){ this.last=d; this.t=now+360; return d; }
    if(now>this.t){ this.t=now+130; return d; } return ''; },
  confirm(){ return Input.btDown(0)||Input.kDown('Enter'); },
  back(){ return Input.btDown(1)||Input.kDown('Escape')||Input.kDown('Backspace'); },

  if(r.type==='toggle') return `<div class="toggle ${SET[r.key]?'on':''}"><i></i></div>`;
  if(r.type==='percent') return `<span class="arrow">‹</span><span class="val">${Math.round(SET[r.key]*100)}%</span><span class="arrow">›</span>`;
  if(r.type==='level'){ const i=r.vals.indexOf(SET[r.key]); return `<span class="arrow">‹</span><span class="val">${r.opts[i<0?1:i]}</span><span class="arrow">›</span>`; }
  return `<span class="arrow">‹</span><span class="val">${SET[r.key]}</span><span class="arrow">›</span>`;
}
function renderCats(){ el('setCats').innerHTML=CATS.map((c,i)=>
  `<div class="catItem ${i===setCat?'sel':''}">${iconImg(c.icon)}${c.key}</div>`).join(''); }
function renderRows(){ el('setPanelTitle').textContent=CATS[setCat].key;
  el('setRows').innerHTML=CATS[setCat].rows.map((r,i)=> r.info
    ? `<div class="setRow" style="opacity:.7;border:none"><span class="lab" style="font-size:min(2vw,16px);color:#b9a8d6">${r.info}</span></div>`
    : `<div class="setRow ${i===setRow?'sel':''}"><span class="lab">${r.label}</span><span class="ctl">${rowVal(r)}</span></div>`).join(''); }
function changeRow(dir){ const r=CATS[setCat].rows[setRow]; if(!r||r.info) return;
  if(r.type==='toggle') SET[r.key]=!SET[r.key];
  else if(r.type==='percent') SET[r.key]=clamp(Math.round((SET[r.key]+dir*0.1)*10)/10,0,1);
  else if(r.type==='level'){ let i=r.vals.indexOf(SET[r.key]); if(i<0)i=1; i=clamp(i+dir,0,r.vals.length-1); SET[r.key]=r.vals[i]; }
  else { let i=r.opts.indexOf(SET[r.key]); i=(i+dir+r.opts.length)%r.opts.length; SET[r.key]=r.opts[i]; }
  applyOne(r.key); saveSet(); renderRows(); Audio.blip(880,0.05,'sine',0.15);
}
function openSettings(ret, cat){ settingsReturn=ret; setCat=cat||0; setRow=selectableRows()[0]||0;
  State.mode='pause'; el('title').classList.add('hidden'); el('pause').classList.remove('hidden');
  Audio.engine(0,false); Audio.siren(false); Audio.screech(0); Audio.horn(false);
  renderCats(); renderRows(); }
function closeSettings(){ el('pause').classList.add('hidden');
  if(settingsReturn==='home'){ State.mode='title'; el('title').classList.remove('hidden'); renderHome(); }
  else { State.mode='play'; Audio.resume(); } }
function navSettings(){
  const d=Nav.dir(); const rows=selectableRows();
  if(d==='up'){ const p=rows.indexOf(setRow); setRow=rows[(p-1+rows.length)%rows.length]; renderRows(); Audio.blip(660,0.04,'sine',0.1); }
  else if(d==='down'){ const p=rows.indexOf(setRow); setRow=rows[(p+1)%rows.length]; renderRows(); Audio.blip(660,0.04,'sine',0.1); }
  else if(d==='left') changeRow(-1);
  else if(d==='right') changeRow(1);
  if(Nav.confirm()) changeRow(1);
  if(Nav.catPrev()){ setCat=(setCat-1+CATS.length)%CATS.length; setRow=selectableRows()[0]||0; renderCats(); renderRows(); }
  if(Nav.catNext()){ setCat=(setCat+1)%CATS.length; setRow=selectableRows()[0]||0; renderCats(); renderRows(); }
  if(Nav.back()||Input.start()) closeSettings();
}

// ========================= START / PAUSE =========================
function startGame(){ Audio.init(); Audio.resume(); Audio.setVol(SET.masterVol,SET.sfxVol);
  fadeOutMusic(); el('title').classList.add('hidden'); el('pause').classList.add('hidden'); el('hud').classList.remove('hidden');
  if(SET.fullscreen) setFullscreen(true);
  State.mode='play'; renderCash(); renderStars(); if(!State.mission) startMission(); }
function pause(){ openSettings('play'); }
function onPad(c){ el('newsBody') && (el('newsBody').innerHTML = c
  ? '🎮 <b style="color:#39ff88">Controller connected</b> — you\'re ready to drive.'
  : 'Welcome to Neon Drive: Leonida — built for TV &amp; Xbox controller.'); }

function menuLoop(){ requestAnimationFrame(menuLoop);
  if(State.mode==='title') navHome();
  else if(State.mode==='pause') navSettings(); }

addEventListener('resize',()=>{ camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight); });

// ========================= LOADING SCREEN =========================
const LOAD_IMGS=['load1_offroad','load2_supra','load3_lambo','load4_katana','load5_boat','load6_challenger','load7_garage','load8_moto'];
function pickInt(seed){ return Math.floor((Math.sin(seed*97.13)*0.5+0.5)*1e6); }

// ========================= BOOT =========================
Input.init(); loadSet();
(async function boot(){
  const t0=performance.now();
  // random art + tip for this load (seeded off time-of-boot bits we already have)
  const seed=(performance.now()%1000)+1;
  el('loading').style.backgroundImage=`url(./assets/loading/${LOAD_IMGS[pickInt(seed)%LOAD_IMGS.length]}.webp)`;
  el('title').style.backgroundImage=`url(./assets/menu_bg.webp)`;   // fixed hero art (title baked in)
  el('pause').style.backgroundImage=`url(./assets/menu_bg.webp)`;
  const bar=el('loadbar'), pct=el('loadpct');
  const setP=(p)=>{ const v=Math.round(p*100); bar.style.width=v+'%'; pct.textContent=v+'%'; };
  await loadAssets((p,k)=>{ setP(p*0.9); });
  setP(0.94);
  attachPlayerCharacter();
  buildWorld(); spawnCoins();
  for(let i=0;i<CFG.traffic;i++) spawnTraffic();
  for(let i=0;i<CFG.peds;i++) spawnPed();
  // spawn ON FOOT on the sidewalk, with a car parked right beside you to jack
  player.pos.set(CFG.road*0.9, 0, 6); player.heading=0; player.mesh.visible=true; player.inCar=null;
  playerCar=new Car('car_sport', CFG.road*0.24, 0, false); playerCar.heading=0; playerCar.integrate(0.0001);
  parked.push(playerCar);
  cam.footYaw=Math.PI; camera.position.set(0,4,-10);
  applyAll(); setP(1);
  // keep the artwork up for a beat so it's actually seen, then reveal the home menu
  const MIN=2600, wait=Math.max(0, MIN-(performance.now()-t0));
  setTimeout(()=>{ el('loading').style.transition='opacity .5s'; el('loading').style.opacity='0';
    setTimeout(()=>{ el('loading').style.display='none'; }, 520);
    State.mode='title'; el('title').classList.remove('hidden'); homeSel=0; renderHome(); onPad(!!Input.gp()); tryMusic();
  }, wait);
  menuLoop(); requestAnimationFrame(animate);
})();

// debug hook for automated testing (harmless)
window.__dbg={player,traffic,peds,parked,State,coins,ramps,colliders,startGame,pause,openSettings,closeSettings,changeRow,navHome,SET,HOME_ITEMS,CATS,setSel:(c,r)=>{setCat=c;setRow=r;},homeSelRef:()=>homeSel,setHomeSel:(v)=>{homeSel=v;renderHome();},enterCar,exitCar,addWanted,nearestCar,PROTO,MANIFEST,CHAR_PROTO,Character,KIT,Radio,CAM_MODES,cam,scene,camera,titleMusic,TOD,applyOne,playerCarRef:()=>playerCar};
</script>
